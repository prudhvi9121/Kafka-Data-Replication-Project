# Define the names of our clusters
clusters = primary, standby

# Start replication immediately (default delay is up to 5 minutes)
scheduled.rebalance.max.delay.ms=0

# Configure the connection details for each cluster
primary.bootstrap.servers = primary-kafka:29092
standby.bootstrap.servers = standby-kafka:29192

# Enable the specific replication path (one-way DR only)
primary->standby.enabled = true
standby->primary.enabled = false

# Tell MirrorMaker which topics to copy (we only want 'commit-log')
primary->standby.topics = commit-log
# Exclude already-replicated and internal topics to prevent loops
primary->standby.topics.exclude = primary\..*,.*\.internal,.*\.checkpoint\.internal,.*\.offset-syncs
refresh.topics.interval.seconds = 10

# Pinpoint how many copies of data we want on the destination side
primary.cluster.alias = primary
standby.cluster.alias = standby

# Single-broker clusters: all MM2 internal topics must use RF=1
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
config.storage.replication.factor = 1
status.storage.replication.factor = 1

# Do NOT sync topic configs from primary to standby.
# This prevents aggressive retention settings (applied during truncation testing)
# from being replicated to the DR cluster and destroying replicated data.
primary->standby.sync.topic.configs.enabled = false
primary->standby.sync.topic.acls.enabled = false

# Use the DefaultReplicationPolicy (the default).
# The DR topic will be named 'primary.commit-log', matching the assignment spec.
# IdentityReplicationPolicy is intentionally NOT used because it creates cycle-detection
# issues and produces the same topic name on both clusters.