# Cluster aliases used throughout this config
clusters = primary, standby

# Skip the built-in rebalance delay so MM2 begins replicating immediately on start
scheduled.rebalance.max.delay.ms=0

# Bootstrap servers for each cluster (Docker Compose internal network)
primary.bootstrap.servers = primary-kafka:29092
standby.bootstrap.servers = standby-kafka:29192

# One-way replication: primary → standby only (DR use-case)
primary->standby.enabled = true
standby->primary.enabled = false

# Replicate only the commit-log topic
primary->standby.topics = commit-log
# Exclude already-replicated topics and MM2 internal topics to prevent feedback loops
primary->standby.topics.exclude = primary\..*,.*\.internal,.*\.checkpoint\.internal,.*\.offset-syncs
refresh.topics.interval.seconds = 10

# Cluster alias labels used to name replicated topics (e.g. primary.commit-log)
primary.cluster.alias = primary
standby.cluster.alias = standby

# All MM2 internal topics must use RF=1 because each cluster is a single broker
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
config.storage.replication.factor = 1
status.storage.replication.factor = 1

# Do not sync topic configs from primary to standby.
# Prevents aggressive retention settings applied during Scenario 2 testing
# from propagating to the DR cluster and deleting replicated data there.
primary->standby.sync.topic.configs.enabled = false
primary->standby.sync.topic.acls.enabled = false

# DefaultReplicationPolicy: DR topic is named 'primary.commit-log' (source alias prefix).
# IdentityReplicationPolicy is not used — it causes cycle-detection issues.